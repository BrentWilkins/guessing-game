[tox]
min_version = 4.0
env_list = py39, py310, py311, py312, lint

[testenv]
package = skip
skip_install = True
allowlist_externals = maturin
commands =
    maturin develop --release
    pip install pytest
    pytest

[testenv:py39]
base_python = python3.9

[testenv:py310]
base_python = python3.10

[testenv:py311]
base_python = python3.11

[testenv:py312]
base_python = python3.12

[testenv:lint]
base_python = python3.9
skip_install = True
commands =
    pip install ruff
    ruff check .